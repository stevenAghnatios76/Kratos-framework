name: brownfield-onboarding
description: 'Apply GAIA framework to an existing project with comprehensive developer knowledge base'
module: lifecycle
agent: orchestrator
config_resolved: "{project-root}/_gaia/lifecycle/.resolved/brownfield-onboarding.yaml"
config_source: "{project-root}/_gaia/lifecycle/config.yaml"
installed_path: "{project-root}/_gaia/lifecycle/workflows/anytime/brownfield-onboarding"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"
on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

output:
  primary: "{planning_artifacts}/brownfield-onboarding.md"
  artifacts:
    - "{planning_artifacts}/project-documentation.md"
    - "{planning_artifacts}/api-documentation.md"
    - "{planning_artifacts}/ux-design.md"
    - "{planning_artifacts}/event-catalog.md"
    - "{planning_artifacts}/dependency-map.md"
    - "{planning_artifacts}/nfr-assessment.md"
    - "{planning_artifacts}/prd.md"
    - "{planning_artifacts}/architecture.md"
    - "{planning_artifacts}/epics-and-stories.md"
    - "{planning_artifacts}/brownfield-onboarding.md"
